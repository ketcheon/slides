# 讚美之泉

---

從天父而來的愛和恩典，
把我們冰冷的心溶解，

---

讓我們獻出每個音符，
把它化為讚美之泉。

---

讓我們張開口，舉起手，
向永生之主稱謝，

---

使讚美之泉流入，
每個人的心間。

---

# 有一位神

---

有一位神，有權能創造宇宙萬物
也有溫柔雙手安慰受傷靈魂

---

有一位神，有權柄審判一切罪惡，
也有慈悲體貼人的軟弱

---

有一位神，我們的神，
唯一的神，名叫耶和華

---

有權威榮光，有恩典慈愛，
是昔在今在永在的神

---

有一位神，有權能創造宇宙萬物，
也有溫柔雙手安慰受傷靈魂

---

有一位神，高坐在榮耀的寶座，
卻死在十架挽救人墮落

---

有一位神，我們的神，
唯一的神，名叫耶和華
